<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity Web Player | Flappy Burd</title>
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no"
    />
    <style>
      /* Fullscreen styles */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #231f20; /* optional: match your Unity background */
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/Builds.loader.js"></script>
    <script>
      // Create Unity instance
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Builds.data",
        frameworkUrl: "Build/Builds.framework.js",
        codeUrl: "Build/Builds.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Meijvogel",
        productName: "Flappy Burd",
        productVersion: "1.0",
        // matchWebGLToCanvasSize: false, // Uncomment if you want separate canvas render size
        // devicePixelRatio: 1, // Override DPI if needed
      })
        .then((unityInstance) => {
          console.log("Unity loaded");
        })
        .catch((message) => {
          alert(message);
        });
    </script>

    <script type="module">
      import { DiscordSDK } from "https://esm.sh/@discord/embedded-app-sdk";

      const discordSdk = new DiscordSDK("1486749863491272725");

      function isRunningInDiscord() {
        const params = new URLSearchParams(window.location.search);
        return params.has("frame_id");
      }

      async function setup() {
        if (!isRunningInDiscord()) {
          console.log("Not running inside Discord, skipping SDK");
          return;
        }

        await discordSdk.ready();
        const { code } = await discordSdk.commands.authorize({
          client_id: "1486749863491272725",
          response_type: "code",
          state: "",
          prompt: "none",
          scope: ["identify"],
        });
        console.log("Discord Activity ready");
      }

      setup();
    </script>
  </body>
</html>
